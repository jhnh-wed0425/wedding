<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>류정현 ♥ 이나현</title>

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

<meta property="og:title" content="류정현 ♥ 이나현 결혼식에 초대합니다">
<meta property="og:description" content="2026년 04월 25일 토요일 오전 11시">
<meta property="og:image" content="대표사진3.jpg">
<meta property="og:type" content="website">

<style>
/* (스타일 부분은 그대로라 생략 없이 전부 유지) */
body{
  margin:0;
  background:#ffffff;
  font-family:'Pretendard', sans-serif;
  color:#222;
  text-align:center;
  line-height:1.9;
}

section{ padding:90px 26px; }
h1{ font-size:26px; font-weight:300; letter-spacing:2px; }
h2{ font-size:13px; letter-spacing:4px; color:#9a9a9a; font-weight:400; margin-bottom:25px; }
.heart{ color:#7b1e2b; }
img{ width:100%; max-width:480px; }

.divider{ width:30px; height:1px; background:#dcdcdc; margin:50px auto; }

.loading{
  position:fixed;
  width:100%;
  height:100%;
  background:#ffffff;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  letter-spacing:3px;
  transition:opacity 1s ease;
}

/* 모달 */
.modal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.modal-content{
  width:85%; max-width:420px;
  background:#fff;
  padding:40px 25px;
  border-radius:18px;
  position:relative;
}
.modal-close{
  position:absolute;
  right:18px; top:15px;
  cursor:pointer;
  font-size:18px;
  color:#999;
}

/* 타이머 */
.timer-wrap{ display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin-top:30px; }
.time-box{ width:70px; padding:18px 0; border:1px solid #e5e5e5; }
.num{ font-size:28px; font-weight:300; }
.label{ margin-top:6px; font-size:10px; letter-spacing:2px; color:#999; }

/* 버튼 */
.button{
  display:inline-block;
  padding:14px 30px;
  border:1px solid #cfcfcf;
  border-radius:40px;
  background:none;
  color:#444;
  font-size:13px;
  letter-spacing:1px;
  margin-top:25px;
}

/* 지도 */
.map-card{
  max-width:480px;
  margin:0 auto;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,0.08);
  cursor:pointer;
}

/* 계좌 */
.account-wrapper{ max-width:480px; margin:40px auto 0; }
.account-box{
  background:#f8f8f8;
  margin-bottom:18px;
  border-radius:16px;
  overflow:hidden;
}
.account-header{
  padding:20px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
  background:#f3f3f3;
}
.account-body{
  max-height:0;
  overflow:hidden;
  transition:max-height 0.5s ease;
  padding:0 20px;
}
.account-body.open{ padding:10px 20px 20px; }
.account-card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 0;
  border-bottom:1px solid #e5e5e5;
  font-size:13px;
}
.account-card:last-child{ border-bottom:none; }
.account-card button{
  background:#e5e5e5;
  border:none;
  padding:8px 16px;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="loading" id="loading">
  WEDDING INVITATION
</div>

<audio id="bgm" autoplay loop>
  <source src="모청bgm.mp3" type="audio/mpeg">
</audio>

<!-- 내용 부분은 기존 그대로 유지 (생략 없이 그대로 사용하면 됨) -->

<!-- RSVP 모달 -->
<div class="modal" id="rsvpModal">
  <div class="modal-content">
    <div class="modal-close" onclick="closeRSVP()">✕</div>
    <h3>참석 여부 전달</h3>
    <p style="margin-top:20px;">
      신랑 010-0000-0000<br><br>
      신부 010-0000-0000
    </p>
  </div>
</div>

<script>

/* ✅ 로딩 수정된 부분 */
document.addEventListener("DOMContentLoaded", function(){
  setTimeout(function(){
    const loading = document.getElementById("loading");
    loading.style.opacity = "0";
    setTimeout(function(){
      loading.style.display = "none";
    }, 1000);
  }, 3000);
});

/* 타이머 */
const target = new Date("2026-04-25T11:00:00").getTime();
setInterval(()=>{
  const now = new Date().getTime();
  const gap = target - now;

  const d = Math.floor(gap / (1000*60*60*24));
  const h = Math.floor((gap % (1000*60*60*24))/(1000*60*60));
  const m = Math.floor((gap % (1000*60*60))/(1000*60));
  const s = Math.floor((gap % (1000*60))/1000);

  document.getElementById("dd").innerText = d;
  document.getElementById("hh").innerText = h;
  document.getElementById("mm").innerText = m;
  document.getElementById("ss").innerText = s;
},1000);

/* 나머지 기능 */
function openMap(){ window.open("https://naver.me/x3iFFSDF"); }
function openRSVP(){ document.getElementById("rsvpModal").style.display="flex"; }
function closeRSVP(){ document.getElementById("rsvpModal").style.display="none"; }
function copyLink(){ navigator.clipboard.writeText(window.location.href); alert("홈페이지 주소가 복사되었습니다."); }

function toggleAccount(id){
  const body=document.getElementById(id);
  const arrow=document.getElementById("arrow-"+id);

  if(body.style.maxHeight && body.style.maxHeight!=="0px"){
    body.style.maxHeight=null;
    body.classList.remove("open");
    arrow.innerHTML="▲";
  }else{
    body.style.maxHeight=body.scrollHeight+"px";
    body.classList.add("open");
    arrow.innerHTML="▼";
  }
}

function copyAccount(event, number){
  event.stopPropagation();
  navigator.clipboard.writeText(number);
  alert("계좌번호가 복사되었습니다.");
}

</script>

</body>
</html>
